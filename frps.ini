[common]
# 服务器监听端口
bind_port = 7000

# 允许客户端连接的端口
vhost_http_port = 8080

# 访问密钥（重要！）
token = your_secret_token_here_change_this

# 日志
log_file = /var/log/frps.log
log_level = info
log_max_days = 3

# 最大连接数
max_pool_count = 50

# HTTP 404页面
custom_404_page = /var/www/html/404.html

# 允许的代理IP（安全）
allow_ports = 8080,3000,5000