[common]
# FRP服务器地址
server_addr = 你的服务器IP
server_port = 7000

# 认证token（必须和服务器一致）
token = your_secret_token_here_change_this

# 客户端名称
user = act_record_client

# HTTP代理配置
[act_record_http]
type = http
local_ip = 127.0.0.1
local_port = 3000
# 自定义域名（固定访问地址）
custom_domains = your-server-ip.nip.io

# TCP代理配置（可选，用于后端API）
[act_record_api]
type = tcp
local_ip = 127.0.0.1
local_port = 5000
remote_port = 5001

# 可选：多个域名
[act_record_domain]
type = http
local_ip = 127.0.0.1
local_port = 3000
custom_domains = xyhgl.your-domain.com  # 如果有域名